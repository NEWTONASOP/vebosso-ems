name: Build Production APK

on:
  push:
    branches:
      - main
    paths:
      - 'app.json'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check version change
        id: check
        run: |
          # Get current version
          CURRENT_VERSION=$(node -p "require('./app.json').expo.version")
          echo "Current version: $CURRENT_VERSION"
          
          # Get previous version (from previous commit)
          git checkout HEAD~1 -- app.json 2>/dev/null || true
          if [ -f app.json ]; then
            PREVIOUS_VERSION=$(node -p "require('./app.json').expo.version")
          else
            PREVIOUS_VERSION="0.0.0"
          fi
          echo "Previous version: $PREVIOUS_VERSION"
          
          # Restore current app.json
          git checkout HEAD -- app.json
          
          # Check if this is a manual trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger - will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION - will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged ($CURRENT_VERSION) - skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
          
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK & CMake
        id: cache-ndk-cmake
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk
            /usr/local/lib/android/sdk/cmake
          key: ${{ runner.os }}-android-ndk-27.1.12297006-cmake-3.22.1

      - name: Install NDK & CMake (if not cached)
        if: steps.cache-ndk-cmake.outputs.cache-hit != 'true'
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # Keyed on package-lock.json instead of the generated android/*.gradle files,
          # since those get rewritten by prebuild every run and would bust the cache
          # even when nothing actually changed.
          key: ${{ runner.os }}-gradle-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_PROJECT_ID=${{ secrets.EXPO_PUBLIC_PROJECT_ID }}" >> .env

      - name: Get version from app.json
        id: version
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > google-services.json

      - name: Generate Android project
        # No --clean: a plain prebuild only rewrites files that actually differ from
        # the current Expo config, so Gradle's up-to-date checks and our caches below
        # (Gradle cache + .cxx native build cache) can actually take effect.
        run: npx expo prebuild --platform android

      - name: Set minSdkVersion
        run: echo "android.minSdkVersion=29" >> android/gradle.properties

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Configure release signing
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/build.gradle")
          text = path.read_text()

          release_block = (
              '        release {\n'
              '            storeFile file("release.keystore")\n'
              '            storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")\n'
              '            keyAlias System.getenv("ANDROID_KEY_ALIAS")\n'
              '            keyPassword System.getenv("ANDROID_KEY_PASSWORD")\n'
              '        }\n'
          )

          if "release {" in text.split("signingConfigs {", 1)[-1].split("}", 1)[0] if "signingConfigs {" in text else False:
              # A release config already exists inside signingConfigs - do nothing.
              pass
          elif "signingConfigs {" in text:
              # signingConfigs block exists (e.g. just "debug") - insert release alongside it.
              text = text.replace("signingConfigs {", "signingConfigs {\n" + release_block, 1)
          else:
              # No signingConfigs block at all - create one with just release.
              text = text.replace(
                  "android {",
                  "android {\n    signingConfigs {\n" + release_block + "    }",
                  1,
              )

          # Point the release build type at the release signing config,
          # regardless of whether it previously referenced debug or nothing.
          if "signingConfig signingConfigs.debug" in text:
              text = text.replace(
                  "signingConfig signingConfigs.debug",
                  "signingConfig signingConfigs.release"
              )
          elif "signingConfig signingConfigs.release" not in text:
              # buildTypes.release exists but has no signingConfig line - add one.
              text = text.replace(
                  "buildTypes {",
                  "buildTypes {\n        release {\n            signingConfig signingConfigs.release\n        }",
                  1,
              )

          path.write_text(text)
          PY

      - name: Verify signing config was added
        run: |
          echo "---- signingConfigs block ----"
          sed -n '/signingConfigs {/,/^    }/p' android/app/build.gradle
          echo "---- signingConfig references ----"
          grep -n "signingConfig signingConfigs" android/app/build.gradle

      - name: Cache CMake/NDK native build
        uses: actions/cache@v4
        with:
          path: android/app/.cxx
          key: ${{ runner.os }}-cxx-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.cpp', '**/*.h', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cxx-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-cxx-

      - name: Configure architecture for arm64-v8a only
        run: |
          echo "" >> android/gradle.properties
          echo "# Build only for arm64-v8a (modern devices)" >> android/gradle.properties
          echo "reactNativeArchitectures=arm64-v8a" >> android/gradle.properties
          echo "" >> android/gradle.properties
          echo "# Memory/parallelism tuning for GitHub-hosted runners (ubuntu-latest: 16GB RAM, 4 cores)" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "org.gradle.workers.max=4" >> android/gradle.properties
          echo "kotlin.incremental=true" >> android/gradle.properties
          echo "org.gradle.caching=true" >> android/gradle.properties
          cat android/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk vebosso-ems-v${{ steps.version.outputs.version }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: VEBOSSO EMS v${{ steps.version.outputs.version }}
          body: |
            ## VEBOSSO EMS v${{ steps.version.outputs.version }}
            
            Download and install the APK below to update your app.
            
            **Installation:**
            1. Download the APK
            2. Open the downloaded file
            3. Allow installation from unknown sources if prompted
            4. Install the update
            
            Commit: ${{ github.sha }}
          files: vebosso-ems-v${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in Supabase
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/vebosso-ems-v${{ steps.version.outputs.version }}.apk
        run: |
          # Update app_settings table with new version and download URL
          curl -X POST "$SUPABASE_URL/rest/v1/app_settings" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"key\": \"latest_version\", \"value\": \"$VERSION\"}"
          
          curl -X POST "$SUPABASE_URL/rest/v1/app_settings" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"key\": \"download_url\", \"value\": \"$DOWNLOAD_URL\"}"
          
          echo "✅ Version updated in Supabase: $VERSION"