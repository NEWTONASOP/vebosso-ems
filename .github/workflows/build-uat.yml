name: Build UAT APK

# ============================================================
# Triggered ONLY manually — never on push.
# Uses UAT Supabase secrets (separate project from production).
# Publishes a pre-release on GitHub so pentesters can download.
# ============================================================

on:
  workflow_dispatch:
    inputs:
      label:
        description: 'Short label for this build (e.g. "pentest-round1")'
        required: false
        default: 'uat'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK & CMake
        id: cache-ndk-cmake
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk
            /usr/local/lib/android/sdk/cmake
          key: ${{ runner.os }}-android-ndk-27.1.12297006-cmake-3.22.1

      - name: Install NDK & CMake (if not cached)
        if: steps.cache-ndk-cmake.outputs.cache-hit != 'true'
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── UAT secrets (separate Supabase project, never touches prod) ──
      - name: Create .env file (UAT)
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL_UAT }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY_UAT }}" >> .env
          echo "EXPO_PUBLIC_PROJECT_ID=${{ secrets.EXPO_PUBLIC_PROJECT_ID }}" >> .env

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > google-services.json

      - name: Get version from app.json
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building UAT for version: $VERSION"

      - name: Generate Android project
        run: npx expo prebuild --platform android

      - name: Set minSdkVersion
        run: echo "android.minSdkVersion=29" >> android/gradle.properties

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Configure release signing
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/build.gradle")
          text = path.read_text()

          release_block = (
              '        release {\n'
              '            storeFile file("release.keystore")\n'
              '            storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")\n'
              '            keyAlias System.getenv("ANDROID_KEY_ALIAS")\n'
              '            keyPassword System.getenv("ANDROID_KEY_PASSWORD")\n'
              '        }\n'
          )

          if "release {" in text.split("signingConfigs {", 1)[-1].split("}", 1)[0] if "signingConfigs {" in text else False:
              pass
          elif "signingConfigs {" in text:
              text = text.replace("signingConfigs {", "signingConfigs {\n" + release_block, 1)
          else:
              text = text.replace(
                  "android {",
                  "android {\n    signingConfigs {\n" + release_block + "    }",
                  1,
              )

          if "signingConfig signingConfigs.debug" in text:
              text = text.replace(
                  "signingConfig signingConfigs.debug",
                  "signingConfig signingConfigs.release"
              )
          elif "signingConfig signingConfigs.release" not in text:
              text = text.replace(
                  "buildTypes {",
                  "buildTypes {\n        release {\n            signingConfig signingConfigs.release\n        }",
                  1,
              )

          path.write_text(text)
          PY

      - name: Cache CMake/NDK native build
        uses: actions/cache@v4
        with:
          path: android/app/.cxx
          key: ${{ runner.os }}-cxx-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.cpp', '**/*.h', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cxx-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-cxx-

      - name: Configure architecture & Gradle tuning
        run: |
          echo "" >> android/gradle.properties
          echo "reactNativeArchitectures=arm64-v8a" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "org.gradle.workers.max=4" >> android/gradle.properties
          echo "kotlin.incremental=true" >> android/gradle.properties
          echo "org.gradle.caching=true" >> android/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          LABEL="${{ github.event.inputs.label }}"
          cp android/app/build/outputs/apk/release/app-release.apk \
            vebosso-ems-v${{ steps.version.outputs.version }}-${LABEL}.apk

      # ── Publish as a PRE-RELEASE so it never looks like a prod release ──
      - name: Create UAT Pre-Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: uat-v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: "[UAT] VEBOSSO EMS v${{ steps.version.outputs.version }} (${{ github.event.inputs.label }})"
          body: |
            ## ⚠️ UAT / Pentest Build — NOT FOR PRODUCTION USE

            This APK points to the **UAT Supabase project** (isolated from production).

            **Label:** `${{ github.event.inputs.label }}`
            **App version:** `${{ steps.version.outputs.version }}`
            **Triggered by:** @${{ github.actor }}
            **Commit:** ${{ github.sha }}

            ### For pentesters
            - Install this APK on a test device
            - Use the credentials provided separately
            - All data goes to the UAT database — production is unaffected
          files: vebosso-ems-v${{ steps.version.outputs.version }}-${{ github.event.inputs.label }}.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
